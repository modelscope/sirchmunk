name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      workflow_name:
        description: "A descriptive name for this build run"
        required: true
        default: "build"
      sirchmunk_branch:
        description: "Sirchmunk branch to build from"
        required: true
        default: "main"
      image_type:
        description: "Image type to build (cpu)"
        required: true
        default: "cpu"
      sirchmunk_version:
        description: "Version label for image tag (empty = auto from version.py)"
        required: false
        default: ""
      ubuntu_version:
        description: "Ubuntu version label for image tag"
        required: false
        default: "22.04"
      python_version:
        description: "Python version for the base image"
        required: false
        default: "3.12"
      node_version:
        description: "Node.js version for the frontend build"
        required: false
        default: "23"
      mirror:
        description: "Mirror profile for builds behind GFW (cn / empty)"
        required: false
        default: ""

run-name: >-
  Docker-${{ inputs.sirchmunk_branch }}-${{ inputs.image_type }}-${{ inputs.workflow_name }}-py${{ inputs.python_version }}-by-@${{ github.actor }}

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.sirchmunk_branch }}

      - name: Generate Dockerfile from template
        run: |
          MIRROR_ARG=""
          if [ -n "${{ github.event.inputs.mirror }}" ]; then
            MIRROR_ARG="--mirror ${{ github.event.inputs.mirror }}"
          fi

          VERSION_ARG=""
          if [ -n "${{ github.event.inputs.sirchmunk_version }}" ]; then
            VERSION_ARG="--sirchmunk_version ${{ github.event.inputs.sirchmunk_version }}"
          fi

          python3 docker/build_image.py \
            --image_type ${{ github.event.inputs.image_type }} \
            --ubuntu_version ${{ github.event.inputs.ubuntu_version }} \
            --python_version ${{ github.event.inputs.python_version }} \
            --node_version ${{ github.event.inputs.node_version }} \
            --dry_run 1 \
            $VERSION_ARG \
            $MIRROR_ARG

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: meta
        run: |
          PY_TAG="py$(echo '${{ github.event.inputs.python_version }}' | tr -d '.')"
          VERSION="${{ github.event.inputs.sirchmunk_version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(python3 -c "import re; m=re.search(r\"__version__\s*=\s*['\\\"]([^'\\\"]+)['\\\"]\", open('src/sirchmunk/version.py').read()); print(m.group(1) if m else 'latest')")
          fi
          TAG="ubuntu${{ github.event.inputs.ubuntu_version }}-${PY_TAG}-${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Computed image tag: ${TAG}"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            modelscope-registry.us-west-1.cr.aliyuncs.com/modelscope-repo/sirchmunk:${{ steps.meta.outputs.tag }}
